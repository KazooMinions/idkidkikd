<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths Warriors</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-functions-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #f0c040;
            --red: #e74c3c;
            --blue: #3498db;
            --green: #2ecc71;
            --bg: #0a0a12;
            --panel: #12121e;
            --panel2: #1a1a2e;
            --border: #2a2a45;
            --text: #e0d8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),
                radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(600px at 20% 50%, rgba(52, 52, 120, 0.15), transparent),
                radial-gradient(600px at 80% 50%, rgba(52, 20, 80, 0.15), transparent);
            pointer-events: none;
            z-index: 0;
        }

        body > * { position: relative; z-index: 1; }

        h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(1.4rem, 4vw, 2.4rem);
            letter-spacing: 0.08em;
            background: linear-gradient(135deg, #f0c040 0%, #fff5c0 50%, #f0c040 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            padding: 18px 0 4px;
            text-align: center;
        }

        #subtitle {
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 0.3em;
            color: rgba(240,192,64,0.5);
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        #msg-display {
            text-align: center;
            font-size: 1.2em;
            font-weight: 700;
            min-height: 30px;
            color: var(--gold);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 0 12px;
        }

        #battle-log {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(240,192,64,0.25);
            border-radius: 8px;
            padding: 8px 14px;
            margin: 6px auto;
            width: 90%; max-width: 600px;
            font-family: monospace;
            font-size: 0.85em;
            color: #8f8;
            min-height: 20px;
        }

        .hidden { display: none !important; }

        #lobby-container {
            display: flex; flex-direction: column; align-items: center; gap: 18px; margin-top: 20px;
        }

        #lobby {
            padding: 28px 24px; background: var(--panel2);
            border: 1px solid var(--border); border-radius: 16px;
            width: min(380px, 92vw);
        }

        #lobby input {
            width: 100%; padding: 10px 14px;
            background: rgba(255,255,255,0.06); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-family: 'Rajdhani', sans-serif;
            font-size: 1em; margin-bottom: 10px;
        }

        #lobby input:focus { outline: none; border-color: var(--gold); }

        .browser-box {
            width: min(420px, 92vw); background: var(--panel2);
            border: 1px solid var(--border); border-radius: 16px; padding: 16px;
        }

        .lobby-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-bottom: 1px solid var(--border);
            gap: 12px;
        }

        button {
            padding: 10px 18px; cursor: pointer; border-radius: 8px;
            font-weight: 700; border: none; margin: 4px;
            font-family: 'Rajdhani', sans-serif; font-size: 0.95em;
            text-transform: uppercase; letter-spacing: 0.05em;
            transition: all 0.15s ease;
        }

        button:hover { transform: translateY(-1px); filter: brightness(1.15); }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-host { background: linear-gradient(135deg, #2980b9, #1a5276); color: white; width: 100%; margin-top: 4px; }
        .btn-join { background: linear-gradient(135deg, #27ae60, #1a6b3c); color: white; padding: 6px 14px; }
        .btn-atk { background: linear-gradient(135deg, #e67e22, #a04000); color: white; }
        .btn-pass { background: #333; color: #aaa; }
        .btn-surr { background: linear-gradient(135deg, #c0392b, #7b241c); color: white; }

        .chip {
            display: inline-flex; align-items: center; justify-content: center;
            width: 26px; height: 26px;
            background: radial-gradient(circle at 35% 35%, #ff6b6b, #c0392b);
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.4);
            box-shadow: 0 2px 8px rgba(192,57,43,0.8);
            margin-left: 8px; font-size: 0.5em; vertical-align: middle;
        }

        .board {
            display: flex; justify-content: center; gap: 16px; margin-top: 10px;
            flex-wrap: wrap; padding: 0 10px;
        }

        .player-side {
            border: 2px solid var(--border); padding: 14px;
            border-radius: 14px; width: min(420px, 96vw);
            min-height: 200px; background: var(--panel);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .player-side h3 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 0.9em; letter-spacing: 0.06em; color: var(--gold);
        }

        .active {
            border-color: var(--gold) !important;
            box-shadow: 0 0 20px rgba(240,192,64,0.15), inset 0 0 40px rgba(240,192,64,0.04);
        }

        .dice-grid {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 12px;
        }

        .die-wrapper {
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; padding: 8px 10px; border-radius: 10px;
            transition: all 0.15s ease;
            user-select: none;
            position: relative;
        }

        .die-wrapper:hover { transform: translateY(-3px); }
        .die-wrapper.captured {
            animation: die-fall 0.55s forwards;
            pointer-events: none;
            z-index: 100;
        }

        .die-wrapper.selected .die-scene { outline: 3px solid var(--gold); box-shadow: 0 0 15px var(--gold); border-radius: 8px; }
        .die-wrapper.in-equation .die-scene { outline: 3px solid var(--blue); box-shadow: 0 0 15px var(--blue); border-radius: 8px; }
        .die-wrapper.target .die-scene { outline: 3px solid var(--red); box-shadow: 0 0 20px var(--red); border-radius: 8px; }

        .die-scene {
            width: 64px;
            height: 64px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }

        .die-blank {
            position: absolute;
            width: 64px;
            height: 64px;
            z-index: 1;
            pointer-events: none;
        }

        .die-img {
            width: 64px;
            height: 64px;
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            position: absolute;
            inset: 0;
            z-index: 2;
        }

        .die-val {
            position: absolute;
            z-index: 10;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.4em;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 5px rgba(0,0,0,0.9), 0 0 10px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .die-sides {
            font-size: 0.7em;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }

        .rolling-style {
            background-size: 512px 384px !important;
            image-rendering: pixelated;
        }

        @keyframes die-fall {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            20% { transform: scale(1.1) translateY(-10px); }
            100% { transform: scale(0.5) translateY(150px) rotate(45deg); opacity: 0; }
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 12px auto;
            padding: 16px 20px;
            background: var(--panel2);
            border-radius: 14px;
            border: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 8px;
            width: min(860px, 96vw);
        }

        #eq-builder {
            width: min(860px, 96vw);
            margin: 10px auto;
            background: var(--panel2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 18px;
        }

        #eq-builder h4 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 0.75em; color: var(--gold); letter-spacing: 0.1em;
            margin-bottom: 10px;
        }

        #eq-slots {
            display: flex; flex-wrap: wrap; align-items: center;
            gap: 6px; min-height: 64px;
            background: rgba(0,0,0,0.35);
            border: 2px dashed rgba(240,192,64,0.3);
            border-radius: 10px; padding: 10px 14px;
            margin-bottom: 10px;
            transition: border-color 0.2s;
        }

        #eq-slots.drag-over {
            border-color: var(--gold);
            background: rgba(240,192,64,0.06);
        }

        #eq-slots .placeholder-text {
            color: rgba(255,255,255,0.25);
            font-style: italic; font-size: 0.9em;
            pointer-events: none;
        }

        .eq-tile {
            display: inline-flex; flex-direction: column; align-items: center;
            background: linear-gradient(135deg, #1e1e3a, #2a2a50);
            border: 1.5px solid rgba(240,192,64,0.5);
            border-radius: 8px; padding: 6px 10px;
            font-weight: 700; font-size: 1.1em;
            cursor: grab; min-width: 42px;
            position: relative;
            transition: box-shadow 0.15s;
            user-select: none;
        }

        .eq-tile:hover { box-shadow: 0 0 10px rgba(240,192,64,0.3); }

        .eq-tile .remove-tile {
            position: absolute; top: -6px; right: -6px;
            width: 16px; height: 16px;
            background: var(--red); border-radius: 50%;
            font-size: 0.65em; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: white; font-weight: 900;
            opacity: 0; transition: opacity 0.15s;
        }

        .eq-tile:hover .remove-tile { opacity: 1; }
        .eq-tile .tile-sides { font-size: 0.5em; color: rgba(255,255,255,0.4); }

        .op-tile {
            display: inline-flex; align-items: center; justify-content: center;
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.07);
            border: 1.5px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            font-weight: 700; font-size: 1.2em; cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        .op-tile:hover { background: rgba(240,192,64,0.2); border-color: var(--gold); }
        .op-tile[draggable="true"] { cursor: grab; }

        .eq-insert-marker {
            width: 4px; height: 40px;
            background: var(--gold);
            border-radius: 999px;
            box-shadow: 0 0 10px rgba(240,192,64,0.65);
        }

        #op-row {
            display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
        }

        #op-row label { font-size: 0.75em; color: rgba(255,255,255,0.45); margin-right: 4px; }

        #eq-preview {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            margin-top: 10px; min-height: 28px;
        }

        #eq-string {
            font-family: monospace; font-size: 1em; color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 6px;
        }

        #eq-result { font-size: 1em; font-weight: 700; }
        #eq-result.match { color: var(--green); }
        #eq-result.nomatch { color: var(--red); }

        .you-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.65em; color: var(--blue);
            border: 1px solid var(--blue); padding: 1px 6px; border-radius: 4px;
            margin-left: 6px; letter-spacing: 0.05em; vertical-align: middle;
        }

        #game-over-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.93);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
            backdrop-filter: blur(8px);
            text-align: center;
            padding: 24px;
        }

        #game-over-overlay h1 { font-size: 3em; }

        #waiting-screen { text-align: center; padding: 40px; }
        #waiting-screen h2 { color: var(--blue); font-family: 'Cinzel Decorative', serif; margin-bottom: 20px; animation: pulse 1.5s ease infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        #attack-mode-indicator {
            text-align: center; font-size: 0.75em; color: rgba(255,255,255,0.4);
            letter-spacing: 0.15em; text-transform: uppercase; margin: 4px 0;
        }

        #attack-mode-indicator span { color: var(--gold); }

        @media (max-width: 600px) {
            .die-img, .die-blank, .die-scene { width: 52px; height: 52px; }
            .die-val { font-size: 1.2em; }
        }
    </style>
</head>
<body>
    <h1>⚔ MATHS WARRIORS ⚔</h1>
    <div id="subtitle">Online · Two Player · Dice Combat</div>

    <div id="msg-display">Enter a username to begin</div>
    <div id="battle-log" class="hidden"></div>

    <div id="lobby-container">
        <div id="lobby">
            <input type="text" id="username-input" placeholder="Your warrior name...">
            <input type="text" id="room-input" placeholder="Room name...">
            <button class="btn-host" onclick="joinRoom(1)">⚔ Host Match</button>
        </div>
        <div class="browser-box">
            <h3 style="margin-top:0; color:#00d4ff; font-family:'Cinzel Decorative',serif; font-size:0.9em; letter-spacing:0.08em;">OPEN ARENAS</h3>
            <div id="room-list"></div>
        </div>
    </div>

    <div id="waiting-screen" class="hidden">
        <h2>Awaiting Challenger...</h2>
        <button class="btn-pass" onclick="location.reload()">Cancel</button>
    </div>

    <div id="main-game" class="hidden">
        <div class="board">
            <div id="p1-area" class="player-side">
                <h3 id="p1-name-display">PLAYER 1</h3>
                <div id="p1-dice" class="dice-grid"></div>
            </div>
            <div id="p2-area" class="player-side">
                <h3 id="p2-name-display">PLAYER 2</h3>
                <div id="p2-dice" class="dice-grid"></div>
            </div>
        </div>

        <div id="eq-builder" class="hidden">
            <h4>⚡ MIND ATTACK — Drag dice into the equation</h4>
            <div id="eq-slots">
                <span class="placeholder-text">Drop your dice here, then add operators between them...</span>
            </div>
            <div id="op-row">
                <label>Insert operator:</label>
                <span class="op-tile" draggable="true" onclick="insertOp('+')" ondragstart="startOpDrag(event, '+')">+</span>
                <span class="op-tile" draggable="true" onclick="insertOp('-')" ondragstart="startOpDrag(event, '-')">−</span>
                <span class="op-tile" draggable="true" onclick="insertOp('*')" ondragstart="startOpDrag(event, '*')">×</span>
                <span class="op-tile" draggable="true" onclick="insertOp('/')" ondragstart="startOpDrag(event, '/')">÷</span>
                <span class="op-tile" draggable="true" onclick="insertOp('(')" ondragstart="startOpDrag(event, '(')">(</span>
                <span class="op-tile" draggable="true" onclick="insertOp(')')" ondragstart="startOpDrag(event, ')')">)</span>
                <button class="btn-pass" style="padding:4px 10px; font-size:0.75em;" onclick="clearEquation()">Clear ✕</button>
            </div>
            <div id="eq-preview">
                <span id="eq-string">—</span>
                <span id="eq-result"></span>
            </div>
        </div>

        <div id="attack-mode-indicator" class="hidden">Mode: <span id="mode-label">—</span></div>
        <div class="controls">
            <button id="mind-btn" class="btn-atk" onclick="activateMind()">🧠 Mind Attack</button>
            <button id="confirm-mind-btn" class="btn-atk hidden" onclick="doMind()" style="background:linear-gradient(135deg,#27ae60,#1a6b3c)">✓ Confirm Mind</button>
            <button id="switch-attack-btn" class="btn-pass hidden" onclick="switchToStrength()">↔ Switch to Strength</button>
            <button id="strength-btn" class="btn-atk" onclick="doStrength()">💪 Strength Attack</button>
            <button id="pass-btn" class="btn-pass" onclick="nextTurn()">⏭ Pass</button>
            <button class="btn-surr" onclick="surrender()">🏳 Surrender</button>
        </div>
    </div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDHeIncfWQLiZb0Mu7WVB8Jj4GZniZJOg",
    authDomain: "math-warrior-7d2a7.firebaseapp.com",
    databaseURL: "https://math-warrior-7d2a7-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "math-warrior-7d2a7",
    storageBucket: "math-warrior-7d2a7.appspot.com",
    messagingSenderId: "1019102123933",
    appId: "1:1019102123933:web:a231ff25b25f8a75280174"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const functions = firebase.app().functions("asia-southeast1");

const api = {
    createRoom: functions.httpsCallable("createRoom"),
    joinRoom: functions.httpsCallable("joinRoom"),
    performStrengthAttack: functions.httpsCallable("performStrengthAttack"),
    performMindAttack: functions.httpsCallable("performMindAttack"),
    passTurn: functions.httpsCallable("passTurn"),
    surrender: functions.httpsCallable("surrender")
};

let p1Dice = [], p2Dice = [], turn = 1, myPlayerNum = 0, currentRoomName = "", isAnimating = false;
let selectedOwn = [], selectedOpp = null, enemySelections = [], enemyTarget = null, penChipOwner = 0;
let p1Name = "Player 1", p2Name = "Player 2", myName = "";
let roomListener = null;
let playerToken = "";
let equationItems = [];
let mindMode = false;
let eqDropIndex = null;

const setStatus = t => document.getElementById("msg-display").innerText = t;
const setLog = t => {
    const el = document.getElementById("battle-log");
    el.innerText = t || "";
    el.classList.toggle("hidden", !t);
};
const escapeHtml = s => String(s).replace(/[&<>"']/g, ch => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[ch]));
const getTokenKey = room => `maths-warriors:${room}:p${myPlayerNum}:token`;

function getRoomNameFromInput(manualRoom) {
    return (manualRoom || document.getElementById("room-input").value).trim();
}

function getPlayerName() {
    return document.getElementById("username-input").value.trim() || "Warrior";
}

async function callServer(fn, payload) {
    try {
        setButtonsDisabled(true);
        const res = await fn(payload);
        return res.data;
    } catch (err) {
        setStatus(err.message || "Server rejected that action.");
        throw err;
    } finally {
        setButtonsDisabled(false);
    }
}

function setButtonsDisabled(disabled) {
    document.querySelectorAll("button").forEach(btn => {
        if (!btn.classList.contains("btn-join")) btn.disabled = disabled;
    });
}

db.ref("rooms").on("value", snap => {
    const listDiv = document.getElementById("room-list");
    listDiv.innerHTML = "";
    const rooms = snap.val();
    if (!rooms) {
        listDiv.innerHTML = '<div style="color:#555;padding:10px">No open arenas</div>';
        return;
    }
    Object.keys(rooms).forEach(key => {
        const room = rooms[key];
        if (!room.winner && room.count < 2) {
            const item = document.createElement("div");
            item.className = "lobby-item";
            item.innerHTML = `<span><strong>${escapeHtml(key)}</strong> <span style="color:#888">vs ${escapeHtml(room.p1Name || "Player 1")}</span></span>`;
            const btn = document.createElement("button");
            btn.className = "btn-join";
            btn.textContent = "Join";
            btn.onclick = () => joinRoom(2, key);
            item.appendChild(btn);
            listDiv.appendChild(item);
        }
    });
    if (!listDiv.children.length) listDiv.innerHTML = '<div style="color:#555;padding:10px">No open arenas</div>';
});

window.joinRoom = async function(pNum, manualRoom = null) {
    const rName = getRoomNameFromInput(manualRoom);
    myName = getPlayerName();
    if (!rName) return alert("Enter a room name");

    myPlayerNum = pNum;
    currentRoomName = rName;

    const response = await callServer(pNum === 1 ? api.createRoom : api.joinRoom, {
        roomName: rName,
        playerName: myName
    });

    playerToken = response.playerToken;
    sessionStorage.setItem(getTokenKey(rName), playerToken);
    listenToRoom(rName);
};

function listenToRoom(roomName) {
    if (roomListener) roomListener.off();
    roomListener = db.ref("rooms/" + roomName);
    roomListener.on("value", snap => {
        const data = snap.val();
        if (!data) return;
        if (data.winner) return showGameOver(data.winner);

        if (data.count < 2) {
            document.getElementById("lobby-container").classList.add("hidden");
            document.getElementById("waiting-screen").classList.remove("hidden");
        } else {
            document.getElementById("waiting-screen").classList.add("hidden");
            document.getElementById("lobby-container").classList.add("hidden");
            document.getElementById("main-game").classList.remove("hidden");

            enemySelections = myPlayerNum === 1 ? (data.p2S || []) : (data.p1S || []);
            enemyTarget = myPlayerNum === 1 ? data.p2T : data.p1T;
            p1Dice = data.p1D || [];
            p2Dice = data.p2D || [];
            p1Name = data.p1Name || "Player 1";
            p2Name = data.p2Name || "Player 2";
            turn = data.turn;
            penChipOwner = data.chip;
            if (data.log) setLog(data.log);
            if (!isAnimating) render();
        }
    });
}

function render() {
    drawDice("p1-dice", p1Dice, 1);
    drawDice("p2-dice", p2Dice, 2);

    document.getElementById("p1-area").className = turn === 1 ? "player-side active" : "player-side";
    document.getElementById("p2-area").className = turn === 2 ? "player-side active" : "player-side";

    document.getElementById("p1-name-display").innerHTML =
        escapeHtml(p1Name) + (myPlayerNum === 1 ? '<span class="you-label">YOU</span>' : "") +
        (penChipOwner === 1 ? '<div class="chip" title="Penalty Chip"></div>' : "");
    document.getElementById("p2-name-display").innerHTML =
        escapeHtml(p2Name) + (myPlayerNum === 2 ? '<span class="you-label">YOU</span>' : "") +
        (penChipOwner === 2 ? '<div class="chip" title="Penalty Chip"></div>' : "");

    setStatus(turn === myPlayerNum ? "YOUR TURN!" : `${turn === 1 ? p1Name : p2Name}'s Turn...`);
    if (mindMode) updateEqPreview();
}

function drawDice(id, list, owner) {
    const container = document.getElementById(id);
    container.innerHTML = "";
    const inEqIndices = new Set(equationItems.filter(e => e.type === "die").map(e => e.dieIdx));

    list.forEach((d, i) => {
        const wrapper = document.createElement("div");
        wrapper.id = `die-${owner}-${i}`;
        wrapper.className = "die-wrapper";

        if (owner === myPlayerNum && inEqIndices.has(i)) wrapper.classList.add("in-equation");
        else if (owner === myPlayerNum && selectedOwn.includes(i)) wrapper.classList.add("selected");
        if (owner !== myPlayerNum && selectedOpp === i) wrapper.classList.add("target");

        wrapper.innerHTML = `
            <div class="die-scene">
                <img src="polyhedral_dice/d${d.s}_blank.png" class="die-blank" onerror="this.style.display='none'">
                <div class="die-img" style="background-image: url('polyhedral_dice/d${d.s}_hires.png')"></div>
                <div class="die-val">${d.v}</div>
            </div>
            <div class="die-sides">d${d.s}</div>`;

        wrapper.onclick = () => {
            if (turn !== myPlayerNum || isAnimating) return;
            if (mindMode) {
                if (owner === myPlayerNum) {
                    if (!inEqIndices.has(i)) addDieToEquation(i);
                } else {
                    selectedOpp = selectedOpp === i ? null : i;
                    syncSelection();
                    render();
                }
            } else {
                if (owner === myPlayerNum) selectedOwn = selectedOwn.includes(i) ? selectedOwn.filter(x => x !== i) : [i];
                else selectedOpp = selectedOpp === i ? null : i;
                syncSelection();
                render();
            }
        };

        container.appendChild(wrapper);
    });
}

function syncSelection() {
    if (!currentRoomName) return;
    const upd = {};
    if (myPlayerNum === 1) {
        upd.p1S = selectedOwn;
        upd.p1T = selectedOpp;
    } else {
        upd.p2S = selectedOwn;
        upd.p2T = selectedOpp;
    }
    db.ref("rooms/" + currentRoomName).update(upd);
}

function activateMind() {
    if (turn !== myPlayerNum) return setStatus("Not your turn!");
    mindMode = true;
    equationItems = [];
    selectedOwn = [];
    selectedOpp = null;
    document.getElementById("eq-builder").classList.remove("hidden");
    document.getElementById("attack-mode-indicator").classList.remove("hidden");
    document.getElementById("mode-label").innerText = "MIND ATTACK";
    document.getElementById("confirm-mind-btn").classList.remove("hidden");
    document.getElementById("switch-attack-btn").classList.remove("hidden");
    document.getElementById("mind-btn").classList.add("hidden");
    document.getElementById("strength-btn").classList.add("hidden");
    render();
    bindEqDropZone();
    setStatus("Select a target die, then build your equation!");
}

function addDieToEquation(idx, atIndex = equationItems.length) {
    const myD = myPlayerNum === 1 ? p1Dice : p2Dice;
    if (!myD[idx]) return;
    const newItem = { type: "die", value: myD[idx].v, sides: myD[idx].s, dieIdx: idx };
    equationItems.splice(atIndex, 0, newItem);
    updateEqPreview();
    render();
}

function insertOp(op, atIndex = equationItems.length) {
    if (!mindMode) return;
    equationItems.splice(atIndex, 0, { type: "op", value: op });
    updateEqPreview();
    renderEqSlots();
}

function startOpDrag(event, op) {
    event.dataTransfer.effectAllowed = "copy";
    event.dataTransfer.setData("text/plain", JSON.stringify({ type: "op", value: op }));
}

function clearEquation() {
    equationItems = [];
    updateEqPreview();
    render();
}

function removeEqItem(idx) {
    equationItems.splice(idx, 1);
    updateEqPreview();
    render();
}

function renderEqSlots() {
    const zone = document.getElementById("eq-slots");
    zone.innerHTML = "";
    if (equationItems.length === 0) {
        zone.innerHTML = '<span class="placeholder-text">Drop your dice here, then add operators between them...</span>';
        return;
    }
    const marker = document.createElement("div");
    marker.className = "eq-insert-marker";
    marker.id = "eq-insert-marker";
    marker.style.display = "none";
    zone.appendChild(marker);

    equationItems.forEach((item, i) => {
        const tile = document.createElement("div");
        tile.dataset.eqIndex = i;
        tile.draggable = true;
        tile.addEventListener("dragstart", e => {
            e.dataTransfer.effectAllowed = "move";
            e.dataTransfer.setData("text/plain", JSON.stringify({ type: "eq-item", index: i }));
        });

        if (item.type === "die") {
            tile.className = "eq-tile";
            tile.innerHTML = `<div>${item.value}</div><div class="tile-sides">d${item.sides}</div><div class="remove-tile" onclick="removeEqItem(${i})">✕</div>`;
        } else {
            tile.className = "eq-tile";
            tile.style.background = "rgba(240,192,64,0.1)";
            tile.style.borderColor = "rgba(240,192,64,0.3)";
            tile.innerHTML = `<div style="font-size:1.2em">${displayOp(item.value)}</div><div class="remove-tile" onclick="removeEqItem(${i})">✕</div>`;
        }
        zone.appendChild(tile);
    });
}

function displayOp(op) {
    if (op === "*") return "×";
    if (op === "/") return "÷";
    if (op === "-") return "−";
    return op;
}

function updateEqPreview() {
    renderEqSlots();
    const strEl = document.getElementById("eq-string");
    const resEl = document.getElementById("eq-result");

    if (equationItems.length === 0) {
        strEl.innerText = "—";
        resEl.innerText = "";
        return;
    }

    strEl.innerText = equationItems.map(e => e.type === "op" ? displayOp(e.value) : e.value).join(" ");

    try {
        const result = evaluateEquationClient(equationItems);
        const targetVal = selectedOpp !== null ? (myPlayerNum === 1 ? p2Dice : p1Dice)[selectedOpp]?.v : null;
        if (targetVal !== null) {
            if (Math.round(result * 1000) / 1000 === targetVal) {
                resEl.innerText = `= ${result} ✓ MATCH!`;
                resEl.className = "match";
            } else {
                resEl.innerText = `= ${result} ✗ (need ${targetVal})`;
                resEl.className = "nomatch";
            }
        } else {
            resEl.innerText = `= ${result}`;
            resEl.className = "";
        }
    } catch {
        resEl.innerText = "...";
        resEl.className = "";
    }
}

function evaluateEquationClient(items) {
    const expression = items.map(item => item.type === "die" ? String(item.value) : item.value).join(" ");
    if (!/^[\d+\-*/().\s]+$/.test(expression)) throw new Error("Invalid expression");
    const result = Function(`"use strict"; return (${expression});`)();
    if (typeof result !== "number" || !Number.isFinite(result)) throw new Error("Invalid expression");
    return result;
}

function exitMindMode() {
    mindMode = false;
    equationItems = [];
    eqDropIndex = null;
    document.getElementById("eq-builder").classList.add("hidden");
    document.getElementById("attack-mode-indicator").classList.add("hidden");
    document.getElementById("confirm-mind-btn").classList.add("hidden");
    document.getElementById("switch-attack-btn").classList.add("hidden");
    document.getElementById("mind-btn").classList.remove("hidden");
    document.getElementById("strength-btn").classList.remove("hidden");
}

function switchToStrength() {
    if (!mindMode) return;
    exitMindMode();
    selectedOwn = [];
    selectedOpp = null;
    syncSelection();
    render();
    setStatus("Mind attack cancelled. Choose your Strength Attack dice.");
}

function bindEqDropZone() {
    const zone = document.getElementById("eq-slots");
    zone.ondragover = e => {
        e.preventDefault();
        zone.classList.add("drag-over");
        eqDropIndex = getEqDropIndex(e.clientX);
        renderEqInsertMarker();
    };
    zone.ondragleave = e => {
        if (!zone.contains(e.relatedTarget)) {
            zone.classList.remove("drag-over");
            hideEqInsertMarker();
        }
    };
    zone.ondrop = e => {
        e.preventDefault();
        zone.classList.remove("drag-over");
        const payloadRaw = e.dataTransfer.getData("text/plain");
        const dropIndex = eqDropIndex ?? equationItems.length;

        try {
            const payload = JSON.parse(payloadRaw);
            if (payload.type === "eq-item") moveEqItem(payload.index, dropIndex);
            else if (payload.type === "op") insertOp(payload.value, dropIndex);
        } catch {
            const idx = parseInt(payloadRaw, 10);
            if (!Number.isNaN(idx)) addDieToEquation(idx, dropIndex);
        }

        hideEqInsertMarker();
    };
}

function getEqDropIndex(clientX) {
    const tiles = [...document.querySelectorAll("#eq-slots .eq-tile")];
    if (tiles.length === 0) return 0;
    for (let i = 0; i < tiles.length; i++) {
        const rect = tiles[i].getBoundingClientRect();
        if (clientX < rect.left + rect.width / 2) return i;
    }
    return tiles.length;
}

function renderEqInsertMarker() {
    const zone = document.getElementById("eq-slots");
    const marker = document.getElementById("eq-insert-marker");
    if (!marker || eqDropIndex === null) return;
    const tiles = [...zone.querySelectorAll(".eq-tile")];
    marker.style.display = "block";
    if (eqDropIndex >= tiles.length) zone.appendChild(marker);
    else zone.insertBefore(marker, tiles[eqDropIndex]);
}

function hideEqInsertMarker() {
    eqDropIndex = null;
    const marker = document.getElementById("eq-insert-marker");
    if (marker) marker.style.display = "none";
}

function moveEqItem(fromIdx, toIdx) {
    if (fromIdx === toIdx || fromIdx < 0 || fromIdx >= equationItems.length) return;
    const [moved] = equationItems.splice(fromIdx, 1);
    const adjustedTo = fromIdx < toIdx ? toIdx - 1 : toIdx;
    equationItems.splice(adjustedTo, 0, moved);
    updateEqPreview();
}

window.doStrength = async function() {
    if (turn !== myPlayerNum) return setStatus("Not your turn!");
    if (selectedOwn.length !== 1 || selectedOpp === null) return setStatus("Select exactly 1 die + 1 target!");
    await animateThenCall([selectedOwn[0]], selectedOpp, () => callServer(api.performStrengthAttack, {
        roomName: currentRoomName,
        playerNum: myPlayerNum,
        playerToken,
        attackerIndex: selectedOwn[0],
        targetIndex: selectedOpp
    }));
};

window.doMind = async function() {
    if (turn !== myPlayerNum) return setStatus("Not your turn!");
    if (selectedOpp === null) return setStatus("Select a target die first!");
    const diceItems = equationItems.filter(e => e.type === "die");
    if (diceItems.length < 2) return setStatus("Use at least 2 dice in the equation!");

    await animateThenCall(diceItems.map(e => e.dieIdx), selectedOpp, () => callServer(api.performMindAttack, {
        roomName: currentRoomName,
        playerNum: myPlayerNum,
        playerToken,
        targetIndex: selectedOpp,
        equationItems: equationItems.map(e => e.type === "die"
            ? { type: "die", dieIdx: e.dieIdx }
            : { type: "op", value: e.value })
    }));
    exitMindMode();
};

async function animateThenCall(usedIndices, targetIndex, serverCall) {
    if (isAnimating) return;
    isAnimating = true;
    const activeTimers = [];
    usedIndices.forEach(idx => {
        const el = document.querySelector(`#die-${myPlayerNum}-${idx} .die-img`);
        if (el) {
            const sides = (myPlayerNum === 1 ? p1Dice : p2Dice)[idx].s;
            activeTimers.push(startDiceAnimation(el, sides));
        }
    });

    const defSide = myPlayerNum === 1 ? 2 : 1;
    const targetEl = document.getElementById(`die-${defSide}-${targetIndex}`);
    if (targetEl) targetEl.classList.add("captured");

    try {
        await new Promise(resolve => setTimeout(resolve, 650));
        await serverCall();
        selectedOwn = [];
        selectedOpp = null;
        equationItems = [];
    } finally {
        activeTimers.forEach(id => clearInterval(id));
        isAnimating = false;
        render();
    }
}

function setSpriteFrame(el, frameIndex) {
    const col = frameIndex % 8;
    const row = Math.floor(frameIndex / 8);
    el.style.backgroundPosition = `-${col * 64}px -${row * 64}px`;
}

function startDiceAnimation(dieElement, sides) {
    dieElement.classList.add("rolling-style");
    dieElement.style.backgroundImage = `url('polyhedral_dice/d${sides}_sheet.png')`;
    let frame = 0;
    return setInterval(() => {
        frame = (frame + 1) % 48;
        setSpriteFrame(dieElement, frame);
    }, 50);
}

window.nextTurn = async function() {
    if (turn !== myPlayerNum) return setStatus("Not your turn!");
    exitMindMode();
    selectedOwn = [];
    selectedOpp = null;
    await callServer(api.passTurn, {
        roomName: currentRoomName,
        playerNum: myPlayerNum,
        playerToken
    });
};

window.surrender = async function() {
    if (!confirm("Surrender the battle?")) return;
    await callServer(api.surrender, {
        roomName: currentRoomName,
        playerNum: myPlayerNum,
        playerToken
    });
};

function showGameOver(winnerId) {
    if (document.getElementById("game-over-overlay")) return;
    const isWin = winnerId === myPlayerNum;
    const wName = winnerId === 1 ? p1Name : p2Name;
    const overlay = document.createElement("div");
    overlay.id = "game-over-overlay";
    overlay.innerHTML = `
        <h1 style="font-family:'Cinzel Decorative',serif;color:${isWin ? "#f0c040" : "#e74c3c"}">${isWin ? "⚔ VICTORY ⚔" : "💀 DEFEAT"}</h1>
        <p style="font-size:1.3em;margin:12px 0">${escapeHtml(wName)} wins the match!</p>
        <button class="btn-host" style="margin-top:20px;max-width:280px" onclick="location.reload()">Return to Lobby</button>`;
    document.body.appendChild(overlay);
    if (isWin) confetti({ particleCount: 250, spread: 110, origin: { y: 0.6 } });
}
</script>
